name: OpenCove
options:
  bundleIdPrefix: com.opencove
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false

targets:
  OpenCove:
    type: application
    platform: iOS
    sources:
      - path: OpenCove
        excludes:
          - "Resources/**"
    resources:
      - path: OpenCove/Resources/Assets.xcassets
    postCompileScripts:
      - name: Copy Terminal Resources
        script: |
          cp "${SRCROOT}/OpenCove/Resources/terminal.html" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opencove.ios
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        PRODUCT_NAME: OpenCove
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  OpenCoveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenCoveTests
    dependencies:
      - target: OpenCove
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.opencove.ios.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
